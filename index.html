<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoLoop Pro - Live Waste Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { background-color: #050810; font-family: 'Poppins', sans-serif; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        #map { height: 200px; border-radius: 1rem; width: 100%; }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center min-h-screen">

    <div class="glass w-full max-w-md p-6 rounded-[35px] border-l-4 border-l-emerald-500 space-y-6 shadow-2xl">
        <!-- Header -->
        <div class="text-center">
            <h1 class="text-2xl font-black text-white tracking-tight">EcoLoop <span class="text-emerald-500">Live</span></h1>
            <p class="text-[10px] text-emerald-400 uppercase tracking-widest font-bold mt-1">100% Real AI & Smart Logistics</p>
        </div>

        <!-- Section 1: Live Scanner -->
        <div class="space-y-3">
            <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400"><i class="fa-solid fa-camera mr-1"></i> 1. Smart AI Scanner</h3>
            <div class="aspect-[4/3] bg-slate-950 rounded-2xl flex items-center justify-center overflow-hidden relative border border-slate-800">
                <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
            </div>

            <button onclick="captureAndScan()" class="w-full bg-emerald-500 text-slate-950 font-black py-4 rounded-2xl text-xs uppercase tracking-widest shadow-lg shadow-emerald-500/20 active:scale-95 transition">
                <i class="fa-solid fa-bolt mr-1"></i> Scan Waste Item
            </button>

            <div id="loading" class="hidden text-center py-2">
                <i class="fa-solid fa-circle-notch fa-spin text-emerald-500 text-xl"></i>
                <p class="text-[11px] text-slate-500 mt-1">සැබෑ Gemini AI හරහා පරීක්ෂා කරමින්...</p>
            </div>

            <div id="result-box" class="hidden bg-slate-900/50 p-4 rounded-2xl border border-slate-800/80">
                <h4 class="text-xs font-black text-emerald-400 mb-2">AI විශ්ලේෂණ වාර්තාව:</h4>
                <p id="result-text" class="text-[13px] text-slate-300 leading-relaxed"></p>
            </div>
        </div>

        <hr class="border-slate-800" />

        <!-- Section 2: PickMe Map & Request -->
        <div class="space-y-3">
            <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400"><i class="fa-solid fa-map-location-dot mr-1"></i> 2. Eco-Pickup (PickMe Style)</h3>
            
            <!-- Live Map -->
            <div id="map" class="border border-slate-800"></div>

            <button onclick="requestPickup()" id="pickup-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl text-xs uppercase tracking-widest shadow-lg shadow-blue-600/20 active:scale-95 transition">
                <i class="fa-solid fa-truck-ramp-box mr-1"></i> Request Pickup Now
            </button>
            
            <div id="pickup-status" class="hidden text-center p-3 bg-blue-950/40 border border-blue-900/50 rounded-2xl text-[12px] text-blue-300">
                <i class="fa-solid fa-truck fa-bounce mr-2"></i> ළඟම ඇති Eco-ලොරි රථය ඔබ වෙත පැමිණෙමින් පවතී...
            </div>
        </div>
    </div>

    <!-- Leaflet JS for Map -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, userMarker;

        // 🎥 කැමරාව පණ ගැන්වීම
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                document.getElementById('video').srcObject = stream;
            } catch (err) { 
                console.error(err);
                alert("කැමරාව ක්‍රියාත්මක කිරීමට අවසර දෙන්න!"); 
            }
        }

        // 🗺️ සිතියම පණ ගැන්වීම (Sri Lanka Location Default)
        function initMap() {
            map = L.map('map').setView([6.9271, 79.8612], 13); // Colombo
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            // User ගේ ඇත්තම Location එක ගැනීම
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    map.setView([lat, lon], 15);
                    userMarker = L.marker([lat, lon]).addTo(map)
                        .bindPopup('ඔබේ ස්ථානය (Eco-Collection Point)')
                        .openPopup();
                });
            }
        }

        window.onload = () => {
            startCamera();
            initMap();
        };

        // 🤖 Netlify Function එක හරහා රූපය ස්කෑන් කිරීම
        async function captureAndScan() {
            const video = document.getElementById('video');
            if(!video.srcObject) return alert("කැමරාව සූදානම් නැත!");

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('result-box').classList.add('hidden');

            try {
                // Netlify Serverless Function එකට Request එක යැවීම
                const response = await fetch('/.netlify/functions/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image })
                });

                const data = await response.json();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('result-box').classList.remove('hidden');

                if(data.text) {
                    document.getElementById('result-text').innerText = data.text;
                } else {
                    document.getElementById('result-text').innerText = "දෝෂයකි: " + (data.error || "පින්තූරය හඳුනාගත නොහැකි විය.");
                }
            } catch (err) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('result-box').classList.remove('hidden');
                document.getElementById('result-text').innerText = "සර්වර් එක ක්‍රියා විරහිතයි. Netlify Deploy එක සිදුවන තෙක් පොඩ්ඩක් ඉන්න.";
            }
        }

        // 🚛 Pickup Request එක (PickMe Style Animation)
        function requestPickup() {
            document.getElementById('pickup-btn').classList.add('hidden');
            document.getElementById('pickup-status').classList.remove('hidden');
            
            if(userMarker) {
                let count = 0;
                const userLatLong = userMarker.getLatLng();
                const truckMarker = L.marker([userLatLong.lat + 0.005, userLatLong.lng + 0.005], {
                    icon: L.icon({
                        iconUrl: 'https://cdn-icons-png.flaticon.com/512/744/744465.png',
                        iconSize: [35, 35]
                    })
                }).addTo(map).bindPopup('Eco Truck').openPopup();

                const interval = setInterval(() => {
                    const curLat = truckMarker.getLatLng().lat;
                    const curLng = truckMarker.getLatLng().lng;
                    
                    truckMarker.setLatLng([
                        curLat - (curLat - userLatLong.lat) * 0.2,
                        curLng - (curLng - userLatLong.lng) * 0.2
                    ]);

                    count++;
                    if(count > 10) {
                        clearInterval(interval);
                        truckMarker.bindPopup('🚨 ලොරි රථය පැමිණ ඇත!').openPopup();
                        document.getElementById('pickup-status').innerHTML = "✅ <b>Eco-ලොරි රථය ඔබගේ ස්ථානයට පැමිණ ඇත!</b>";
                    }
                }, 1000);
            }
        }
    </script>
</body>
</html>
