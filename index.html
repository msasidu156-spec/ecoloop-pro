    <!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoLoop Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-6">
    <div class="max-w-md mx-auto glass p-6 rounded-3xl border border-slate-800">
        <h1 class="text-xl font-black mb-4">EcoLoop AI Scanner</h1>
        <video id="video" class="w-full rounded-2xl mb-4 bg-black" autoplay playsinline></video>
        <button onclick="startCamera()" class="w-full bg-slate-800 py-3 rounded-xl mb-2 font-bold">Start Camera</button>
        <button onclick="captureAndScan()" class="w-full bg-emerald-500 py-3 rounded-xl font-black text-black">Scan with AI</button>
        <canvas id="canvas" class="hidden"></canvas>
        <div id="result" class="mt-4 p-4 bg-slate-900 rounded-2xl text-sm hidden"></div>
    </div>

    <script>
        const Gemini_API_KEY = "AIzaSyBvEfW6H5oI8VG9R_gK_3Z_t0j8nS_6C_2w";
        
        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            document.getElementById('video').srcObject = stream;
        }

        async function captureAndScan() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            const base64 = canvas.toDataURL('image/jpeg').split(',')[1].trim();
            const resDiv = document.getElementById('result');
            resDiv.innerText = "AI එක පරීක්ෂා කරයි...";
            resDiv.classList.remove('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${Gemini_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { inlineData: { mimeType: "image/jpeg", data: base64 } },
                                { text: "Identify this waste item. Return result in Sinhala as: Item: [Name], Weight: [X]kg, Price: රු. [Price]. Add a short tip." }
                            ]
                        }]
                    })
                });
                const data = await response.json();
                resDiv.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                resDiv.innerText = "Error: API එක වැඩ නැත. කරුණාකර නැවත උත්සාහ කරන්න.";
            }
        }
    </script>
</body>
</html>
